<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>shooting game!</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            user-select: none;
        }
        
        /* 科技感UI叠加层 */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        /* 顶部状态栏 - 全息风格 */
        .hud-top {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.8);
            font-weight: bold;
        }
        
        .stat-panel {
            background: rgba(0, 5, 15, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 8px 18px;
            border-left: 3px solid #0ff;
            border-right: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
            letter-spacing: 1px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #8af;
            letter-spacing: 2px;
        }
        
        .stat-value {
            font-size: 24px;
            color: #0ff;
            font-family: 'Orbitron', monospace;
            line-height: 1;
        }
        
        .ammo-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
        }
        
        .ammo-current {
            font-size: 42px;
            font-weight: 800;
            color: #ffaa44;
            text-shadow: 0 0 10px #ff6600;
            line-height: 1;
        }
        
        .ammo-max {
            font-size: 18px;
            color: #9cf;
        }
        
        /* 准星 - 科技动态瞄准 */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 28px;
            height: 28px;
            pointer-events: none;
            z-index: 20;
        }
        
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: #0ff;
            box-shadow: 0 0 6px #0ff, 0 0 12px #0af;
        }
        
        .crosshair::before {
            top: 0;
            left: 50%;
            width: 2px;
            height: 12px;
            transform: translateX(-50%);
        }
        
        .crosshair::after {
            bottom: 0;
            left: 50%;
            width: 2px;
            height: 12px;
            transform: translateX(-50%);
        }
        
        .crosshair .dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: #f0f;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #f0f;
        }
        
        .crosshair .hline {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: #0ff;
            transform: translateY(-50%);
            box-shadow: 0 0 6px #0ff;
        }
        
        /* 武器切换提示 */
        .weapon-info {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            border-radius: 16px;
            border-right: 3px solid #0ff;
            border-bottom: 1px solid #0ff;
            text-align: right;
            pointer-events: none;
            font-family: 'Orbitron', monospace;
        }
        
        .weapon-name {
            font-size: 18px;
            color: #cfc;
            letter-spacing: 2px;
        }
        
        .weapon-stats {
            font-size: 12px;
            color: #8af;
        }
        
        /* 击杀提示区域 */
        .kill-feed {
            position: absolute;
            top: 100px;
            right: 20px;
            width: 240px;
            pointer-events: none;
            text-align: right;
            z-index: 15;
        }
        
        .kill-entry {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border-left: 4px solid #ff3366;
            padding: 5px 12px;
            margin-bottom: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            animation: fadeOut 2s forwards;
            border-radius: 4px;
            font-family: monospace;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(0);}
            70% { opacity: 0.8; }
            100% { opacity: 0; transform: translateX(30px); display: none; visibility: hidden;}
        }
        
        /* 伤害指示器 */
        .damage-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,0,0,0) 60%, rgba(255,0,0,0.25) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 5;
        }
        
        /* 游戏结束画面 */
        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
            flex-direction: column;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s;
        }
        
        .game-overlay h1 {
            font-size: 48px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            margin-bottom: 20px;
        }
        
        .game-overlay button {
            background: linear-gradient(45deg, #0a2a3a, #001a2a);
            border: 2px solid #0ff;
            color: #0ff;
            font-size: 24px;
            padding: 12px 32px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            transition: 0.2s;
            margin-top: 30px;
            border-radius: 40px;
            letter-spacing: 2px;
        }
        
        .game-overlay button:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 25px #0ff;
        }
        
        .hidden {
            display: none;
        }
        
        .health-bar-bg {
            position: absolute;
            bottom: 40px;
            left: 30px;
            width: 280px;
            height: 12px;
            background: #330000;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #f44;
            box-shadow: 0 0 10px rgba(255,0,0,0.4);
        }
        
        .health-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff3366, #ff8844);
            transition: width 0.2s;
            border-radius: 6px;
        }
        
        .health-text {
            position: absolute;
            bottom: 55px;
            left: 30px;
            font-size: 12px;
            color: #faa;
            text-shadow: 0 0 5px red;
        }
        
        @keyframes pulse {
            0% { opacity: 0.6; text-shadow: 0 0 2px cyan;}
            100% { opacity: 1; text-shadow: 0 0 12px cyan;}
        }
    </style>
</head>
<body>
    <div class="ui-container">
        <div class="hud-top">
            <div class="stat-panel">
                <div class="stat-label">⚡ 量子积分</div>
                <div class="stat-value" id="scoreValue">0</div>
            </div>
            <div class="stat-panel">
                <div class="stat-label">💀 歼灭数</div>
                <div class="stat-value" id="killCount">0</div>
            </div>
        </div>
        <div class="ammo-panel" style="position: absolute; bottom: 30px; left: 30px;">
            <div class="stat-label">🔫 能量弹匣</div>
            <div><span class="ammo-current" id="currentAmmo">30</span> <span class="ammo-max" id="maxAmmo">/ 30</span></div>
            <div class="weapon-stats" style="font-size: 10px;">⚡ 脉冲步枪</div>
        </div>
        <div class="health-bar-bg">
            <div class="health-bar-fill" id="healthFill" style="width: 100%"></div>
        </div>
        <div class="health-text" id="healthText">❤️ 装甲强度: 100</div>
        
        <div class="crosshair">
            <div class="hline"></div>
            <div class="dot"></div>
        </div>
        
        <div class="weapon-info">
            <div class="weapon-name">X-23 脉冲步枪</div>
            <div class="weapon-stats">射速: 极高 | 伤害: 45</div>
            <div class="weapon-stats">⚡ 能量过载 [R] 装填</div>
        </div>
        
        <div class="kill-feed" id="killFeed"></div>
        <div class="damage-overlay" id="damageOverlay"></div>
    </div>
    
    <div id="gameOverPanel" class="game-overlay hidden">
        <h1>⚡ 任务失败 ⚡</h1>
        <div id="finalStats" style="color:#0ff; font-size:22px; margin-bottom:20px;"></div>
        <button id="restartBtn">🔄 重新武装</button>
    </div>

    <!-- 引入Three.js核心库以及扩展 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/PointerLockControls.js';
        
        // ---------- 初始化场景、相机、渲染器 ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);
        
        // 科技感网格地面 + 反射平面
        const gridHelper = new THREE.GridHelper(200, 50, 0x00ccff, 0x336699);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // 炫酷环形地板
        const floorPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 80),
            new THREE.MeshStandardMaterial({ color: 0x112233, roughness: 0.4, metalness: 0.7, transparent: true, opacity: 0.6 })
        );
        floorPlane.rotation.x = -Math.PI / 2;
        floorPlane.position.y = -0.4;
        scene.add(floorPlane);
        
        // 环境光 + 科技点光源
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x2266ff, 0.5);
        backLight.position.set(0, 5, -5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xff44aa, 0.3);
        fillLight.position.set(3, 2, 4);
        scene.add(fillLight);
        
        // 动态粒子科技氛围
        const particleGeo = new THREE.BufferGeometry();
        const particleCount = 1200;
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 150;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 20 + 2;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 100 - 30;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x33aaff, size: 0.12, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // 随机科技柱体
        const pillars = [];
        for (let i = 0; i < 36; i++) {
            const angle = (i / 36) * Math.PI * 2;
            const radius = 18;
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x33aaff, metalness: 0.85, roughness: 0.2, emissive: 0x004466 });
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 2.5, 8), pillarMat);
            pillar.position.x = Math.cos(angle) * radius;
            pillar.position.z = Math.sin(angle) * radius;
            pillar.position.y = 0.8;
            scene.add(pillar);
            pillars.push(pillar);
            
            const ringLight = new THREE.Mesh(new THREE.TorusGeometry(0.65, 0.05, 16, 40), new THREE.MeshStandardMaterial({ color: 0xff44cc, emissive: 0x441133 }));
            ringLight.position.y = 1.2;
            pillar.add(ringLight);
        }
        
        // ---------- 玩家控制器 ----------
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => {
            controls.lock();
        });
        scene.add(controls.getObject()); // 相机控制对象
        
        // 移动逻辑
        const keyState = {
            KeyW: false, KeyA: false, KeyS: false, KeyD: false
        };
        let moveSpeed = 7.5;
        const velocity = new THREE.Vector3(0, 0, 0);
        
        window.addEventListener('keydown', (e) => {
            if (keyState.hasOwnProperty(e.code)) keyState[e.code] = true;
            if (e.code === 'KeyR') reloadWeapon();
        });
        window.addEventListener('keyup', (e) => {
            if (keyState.hasOwnProperty(e.code)) keyState[e.code] = false;
        });
        
        // 游戏状态
        let playerHealth = 100;
        let score = 0;
        let kills = 0;
        let currentAmmo = 30;
        const maxAmmo = 30;
        let isReloading = false;
        let shootCooldown = false;
        const shootDelay = 150; // ms
        let enemies = [];
        
        // UI元素
        const scoreElem = document.getElementById('scoreValue');
        const killCountElem = document.getElementById('killCount');
        const currentAmmoElem = document.getElementById('currentAmmo');
        const healthFillElem = document.getElementById('healthFill');
        const healthTextElem = document.getElementById('healthText');
        const damageOverlay = document.getElementById('damageOverlay');
        const killFeedDiv = document.getElementById('killFeed');
        
        function updateUI() {
            scoreElem.innerText = Math.floor(score);
            killCountElem.innerText = kills;
            currentAmmoElem.innerText = currentAmmo;
            let healthPercent = Math.max(0, (playerHealth / 100)) * 100;
            healthFillElem.style.width = healthPercent + '%';
            healthTextElem.innerText = `🛡️ 装甲强度: ${Math.floor(playerHealth)}`;
            if (playerHealth <= 25) healthTextElem.style.color = "#ff6666";
            else healthTextElem.style.color = "#faa";
        }
        
        function addKillMessage(enemyName) {
            const entry = document.createElement('div');
            entry.className = 'kill-entry';
            entry.innerHTML = `🔫 击杀 ${enemyName}  +25 积分`;
            killFeedDiv.appendChild(entry);
            setTimeout(() => entry.remove(), 2000);
        }
        
        function applyDamage(amount) {
            playerHealth = Math.max(0, playerHealth - amount);
            updateUI();
            damageOverlay.style.opacity = '0.4';
            setTimeout(() => { damageOverlay.style.opacity = '0'; }, 150);
            if (playerHealth <= 0) {
                gameOver();
            }
        }
        
        function reloadWeapon() {
            if (isReloading || currentAmmo === maxAmmo) return;
            isReloading = true;
            // 简单UI反馈
            currentAmmoElem.style.color = "#ffaa66";
            setTimeout(() => {
                currentAmmo = maxAmmo;
                isReloading = false;
                currentAmmoElem.style.color = "#ffaa44";
                updateUI();
            }, 1000);
        }
        
        function shoot() {
            if (isReloading || shootCooldown) return;
            if (currentAmmo <= 0) {
                // 空仓提示音视觉反馈
                currentAmmoElem.style.transform = "scale(1.1)";
                setTimeout(() => currentAmmoElem.style.transform = "", 150);
                return;
            }
            currentAmmo--;
            updateUI();
            shootCooldown = true;
            setTimeout(() => { shootCooldown = false; }, shootDelay);
            
            // 枪口闪光特效
            const flash = new THREE.PointLight(0xff6600, 1.2, 12);
            flash.position.set(0.5, -0.2, -1.2);
            controls.getObject().add(flash);
            setTimeout(() => controls.getObject().remove(flash), 80);
            
            // 射线检测敌人
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(enemies.map(e => e.mesh));
            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const enemyObj = enemies.find(e => e.mesh === hitMesh);
                if (enemyObj) {
                    enemyObj.health -= 45;
                    // 命中特效
                    const hitEffect = new THREE.Mesh(new THREE.SphereGeometry(0.2, 4, 4), new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff2200 }));
                    hitEffect.position.copy(intersects[0].point);
                    scene.add(hitEffect);
                    setTimeout(() => scene.remove(hitEffect), 150);
                    
                    if (enemyObj.health <= 0) {
                        // 击杀
                        const idx = enemies.indexOf(enemyObj);
                        if (idx !== -1) {
                            scene.remove(enemyObj.mesh);
                            enemies.splice(idx, 1);
                            kills++;
                            score += 25;
                            addKillMessage("幽灵猎手");
                            updateUI();
                            // 随机掉落弹药机制
                            if (Math.random() < 0.4) {
                                currentAmmo = Math.min(maxAmmo, currentAmmo + 8);
                                updateUI();
                                addKillMessage("弹药补给 +8");
                            }
                        }
                    } else {
                        // 受击变色
                        enemyObj.mesh.material.emissiveIntensity = 0.7;
                        setTimeout(() => { if(enemyObj.mesh) enemyObj.mesh.material.emissiveIntensity = 0.2; }, 150);
                    }
                }
            }
        }
        
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && controls.isLocked && !document.getElementById('gameOverPanel').classList.contains('hidden')) {
                shoot();
            }
        });
        
        // 生成敌人 (科技无人机造型)
        function createEnemy(x, z) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const material = new THREE.MeshStandardMaterial({ color: 0xdd2255, metalness: 0.7, emissive: 0x441122, emissiveIntensity: 0.3 });
            const core = new THREE.Mesh(bodyGeo, material);
            group.add(core);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.07, 16, 32), new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x0088aa }));
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.5, 6), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
            antenna.position.y = 0.5;
            group.add(antenna);
            
            group.position.set(x, 0.4, z);
            scene.add(group);
            return {
                mesh: group,
                health: 70,
                speed: 2.2,
                damage: 14,
                attackCooldown: 0
            };
        }
        
        // 初始生成敌人
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rad = 10 + Math.random() * 12;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            enemies.push(createEnemy(x, z));
        }
        
        // AI 更新
        let lastTimestamp = 0;
        let spawnTimer = 0;
        
        function updateGame(deltaTime) {
            if (playerHealth <= 0) return;
            const dt = Math.min(deltaTime, 0.033);
            // 移动
            const actualSpeed = moveSpeed * dt;
            const cameraDir = controls.getObject();
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            cameraDir.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            right.normalize();
            
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState.KeyW) move.z -= 1;
            if (keyState.KeyS) move.z += 1;
            if (keyState.KeyD) move.x += 1;
            if (keyState.KeyA) move.x -= 1;
            move.normalize();
            const moveVec = new THREE.Vector3().addScaledVector(forward, move.z).addScaledVector(right, move.x);
            cameraDir.position.x += moveVec.x * actualSpeed;
            cameraDir.position.z += moveVec.z * actualSpeed;
            
            // 边界限制
            const limit = 32;
            cameraDir.position.x = Math.min(limit, Math.max(-limit, cameraDir.position.x));
            cameraDir.position.z = Math.min(limit, Math.max(-limit, cameraDir.position.z));
            
            // 敌人AI
            const playerPos = cameraDir.position;
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                const dir = new THREE.Vector3().subVectors(playerPos, e.mesh.position);
                dir.y = 0;
                dir.normalize();
                e.mesh.position.x += dir.x * e.speed * dt;
                e.mesh.position.z += dir.z * e.speed * dt;
                // 面向玩家
                e.mesh.lookAt(playerPos);
                // 攻击冷却
                if (e.attackCooldown <= 0) {
                    const dist = e.mesh.position.distanceTo(playerPos);
                    if (dist < 2.2) {
                        applyDamage(e.damage);
                        e.attackCooldown = 0.8;
                        // 击退效果
                        const knockDir = new THREE.Vector3().subVectors(e.mesh.position, playerPos).normalize();
                        cameraDir.position.x += knockDir.x * 1.2;
                        cameraDir.position.z += knockDir.z * 1.2;
                    }
                } else {
                    e.attackCooldown -= dt;
                }
            }
            
            // 动态生成敌人，保持压力
            spawnTimer += dt;
            if (spawnTimer > 5.0 && enemies.length < 12) {
                spawnTimer = 0;
                let side = Math.floor(Math.random() * 4);
                let x, z;
                const range = 22;
                if (side === 0) { x = -range; z = (Math.random() - 0.5) * range * 1.5; }
                else if (side === 2) { x = range; z = (Math.random() - 0.5) * range * 1.5; }
                else if (side === 1) { z = -range; x = (Math.random() - 0.5) * range * 1.5; }
                else { z = range; x = (Math.random() - 0.5) * range * 1.5; }
                enemies.push(createEnemy(x, z));
            }
            
            // 漂浮粒子动画
            particles.rotation.y += 0.002;
            pillars.forEach((p, idx) => {
                p.children[0].rotation.z += 0.01;
            });
        }
        
        function gameOver() {
            if (!document.getElementById('gameOverPanel').classList.contains('hidden')) return;
            controls.unlock();
            const panel = document.getElementById('gameOverPanel');
            panel.classList.remove('hidden');
            document.getElementById('finalStats').innerHTML = `⚡ 最终积分: ${Math.floor(score)}<br>💀 消灭敌人: ${kills}`;
        }
        
        function restartGame() {
            // 重置状态
            playerHealth = 100;
            score = 0;
            kills = 0;
            currentAmmo = 30;
            isReloading = false;
            shootCooldown = false;
            // 清除敌人
            enemies.forEach(e => scene.remove(e.mesh));
            enemies = [];
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const rad = 9 + Math.random() * 12;
                const x = Math.cos(angle) * rad;
                const z = Math.sin(angle) * rad;
                enemies.push(createEnemy(x, z));
            }
            // 重置相机位置
            controls.getObject().position.set(0, 1.6, 0);
            updateUI();
            document.getElementById('gameOverPanel').classList.add('hidden');
            controls.lock();
            spawnTimer = 0;
        }
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            restartGame();
        });
        
        // 动画循环
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.03) dt = 0.03;
            if (controls.isLocked && playerHealth > 0) {
                updateGame(dt);
            }
            // 简单的浮动UI动画
            const cross = document.querySelector('.crosshair');
            if (shootCooldown) cross.style.transform = "translate(-50%, -50%) scale(0.9)";
            else cross.style.transform = "translate(-50%, -50%) scale(1)";
            
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 显示初始状态
        updateUI();
        animate();
        
        // 控制台提示
        console.log("科技射击游戏已启动 | 单击画面锁定鼠标 | WASD移动 | 鼠标左键射击 | R换弹");
    </script>
</body>
</html>
