<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSGO Game Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to the CSGO Game</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Play</a></li>
                <li><a href="#">Settings</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="game-area">
            <h2>Game Area</h2>
            <!-- Game rendering will go here -->
        </section>
        <section id="scoreboard">
            <h2>Scoreboard</h2>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Player 1</td>
                        <td>0</td>
                    </tr>
                    <tr>
                        <td>Player 2</td>
                        <td>0</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 CSGO Game. All rights reserved.</p>
    </footer>
</body>
</html>
