<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Enshuo 的 3D 逻辑世界</title>
    <style>
        /* 基础样式：铺满屏幕，隐藏滚动条 */
        body { margin: 0; overflow: hidden; background-color: #000; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #0ff; font-family: 'Courier New', monospace;
            pointer-events: none; text-shadow: 0 0 5px #0ff;
        }
    </style>
</head>
<body>
    <div id="info">逻辑核心已启动 | 310104@westperrysd.org</div>

    <script src="libs/three.min.js"></script>

    <script>
        // --- 1. 创建场景 (World) ---
        const scene = new THREE.Scene();

        // --- 2. 创建相机 (Eyes) ---
        // 参数：视角, 宽高比, 近剪裁面, 远剪裁面
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // --- 3. 创建渲染器 (Engine) ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 针对 Chromebook 优化：限制像素比，防止风扇狂转
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 4. 加载背景图 (Environment) ---
        const loader = new THREE.TextureLoader();
        // 这里引用你之前发的背景图文件名
        loader.load('image_57b7a5.png', function(texture) {
            scene.background = texture;
        });

        // --- 5. 创建一个发光的“逻辑立方体” (Object) ---
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0x00ffff, 
            wireframe: true // 使用线框模式，更有黑客感
        });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);

        // --- 6. 添加光效 (Light) ---
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040)); // 环境光

        // --- 7. 动画循环 (The Pulse) ---
        function animate() {
            requestAnimationFrame(animate);

            // 让立方体自转，证明世界是活的
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;

            renderer.render(scene, camera);
        }

        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        console.log("3D 世界初始化成功！");
    </script>
</body>
</html>
