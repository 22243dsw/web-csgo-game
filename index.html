<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>森林枪战 - 第一人称射击游戏 | Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        /* 游戏UI面板 */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            padding: 10px 22px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            border-left: 4px solid #ff5500;
            pointer-events: none;
            font-size: 18px;
        }
        #score { color: #ffaa44; font-size: 26px; margin-right: 20px; }
        #health { color: #ff6666; font-size: 26px; }
        .label { font-size: 14px; margin-right: 6px; color: #ccc; }
        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 28px;
            height: 28px;
            transform: translate(-50%, -50%);
            z-index: 200;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,240,0.95);
            box-shadow: 0 0 2px black;
        }
        #crosshair::before {
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            transform: translateY(-50%);
        }
        #crosshair::after {
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
        }
        .dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: #ff4422;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        /* 提示及控制 */
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 8px;
            color: #aaffaa;
            font-size: 13px;
            pointer-events: none;
            z-index: 100;
        }
        #controls-tip {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 8px;
            color: #ddd;
            font-size: 12px;
            text-align: right;
            pointer-events: none;
            z-index: 100;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(12px);
            padding: 30px 45px;
            border-radius: 24px;
            text-align: center;
            color: white;
            font-family: monospace;
            z-index: 300;
            display: none;
            flex-direction: column;
            gap: 18px;
            border: 2px solid #ff6644;
            pointer-events: auto;
            min-width: 260px;
        }
        #game-over h1 { margin: 0; font-size: 44px; color: #ff7755; }
        #restart-btn {
            background: #ff5533;
            border: none;
            color: white;
            padding: 10px 26px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }
        #restart-btn:hover { background: #ff7744; transform: scale(1.03); }
        .damage-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(180, 30, 30, 0.45);
            pointer-events: none;
            z-index: 150;
            opacity: 0;
            transition: opacity 0.08s;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span class="label">🔫 得分:</span>
        <span id="score">0</span>
        <span class="label" style="margin-left: 20px;">❤️ 生命:</span>
        <span id="health">100</span>
    </div>
    <div id="crosshair"><div class="dot"></div></div>
    <div id="info">🌲 森林激战 · 红色恶魔入侵</div>
    <div id="controls-tip">🖱️ 鼠标瞄准 + 左键射击<br>🚶 WASD 移动 | 🔓 ESC 解锁鼠标</div>
    <div id="game-over">
        <h1>💀 GAME OVER 💀</h1>
        <p id="final-score">你的战绩: 0</p>
        <button id="restart-btn">重新战斗</button>
    </div>
    <div id="damage-overlay" class="damage-flash"></div>
    <!-- 引入 Three.js -->
    <script type="text/javascript" src="three.min.js"></script>
    <!-- 引入 PointerLockControls -->
    <script type="module">
        import { PointerLockControls } from './PointerLockControls.js';
        window.PointerLockControls = PointerLockControls;
    </script>
    <!-- 引入游戏主逻辑 -->
    <script src="game.js"></script>
</body>
</html>
